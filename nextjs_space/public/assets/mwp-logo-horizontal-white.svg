<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50" fill="none">
  <!-- Open Book Icon (scaled) -->
  <g transform="translate(0, 2) scale(0.55)">
    <!-- Left page -->
    <path d="M10 15 L10 70 Q30 65 48 70 L48 15 Q30 10 10 15" fill="#1E3A8A" stroke="white" stroke-width="2"/>
    <!-- Right page -->
    <path d="M52 15 L52 70 Q70 65 90 70 L90 15 Q70 10 52 15" fill="#1E3A8A" stroke="white" stroke-width="2"/>
    <!-- Book spine/binding -->
    <rect x="47" y="12" width="6" height="60" fill="white"/>
    <!-- Gold bookmark ribbon -->
    <path d="M50 12 L50 75" stroke="#C9A227" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="65" y="32" fill="white" font-family="Georgia, serif" font-size="20" font-weight="bold">Ministerial Worship Planner</text>
</svg>
